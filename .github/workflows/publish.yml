name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Determine publish necessity
        id: version_check
        run: |
          PACKAGE_NAME='@sealad886/homebridge-blink-cameras-new-api'
          TARGET=$(node -p "require('./package.json').version")
          CURRENT=$(npm view "${PACKAGE_NAME}" version 2>/dev/null || echo "0.0.0")
          TARGET_EXISTS=$(npm view "${PACKAGE_NAME}@${TARGET}" version 2>/dev/null || true)
          PUBLISHED_VERSIONS=$(npm view "${PACKAGE_NAME}" versions --json 2>/dev/null || echo '[]')
          STABLE_VERSION=$(node -e '
            const parsed = JSON.parse(process.argv[1]);
            const versions = Array.isArray(parsed) ? parsed : [parsed];
            const stable = versions.filter((version) => !/-(alpha|beta|rc)\./.test(version)).at(-1) ?? "";
            process.stdout.write(stable);
          ' "${PUBLISHED_VERSIONS}")
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "stable_version=$STABLE_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$TARGET_EXISTS" != "$TARGET" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
          # Detect prerelease versions (e.g. 0.6.0-alpha.1, 1.0.0-beta.2)
          if echo "$TARGET" | grep -qE -- '-(alpha|beta|rc)\.'; then
            PRETAG=$(echo "$TARGET" | sed -E 's/.*-(alpha|beta|rc)\..*/\1/')
            echo "npm_tag=$PRETAG" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.version_check.outputs.publish == 'true'
        run: npm run build

      - name: Test
        if: steps.version_check.outputs.publish == 'true'
        run: npm test

      - name: Ensure npm token present
        if: steps.version_check.outputs.publish == 'true' || steps.version_check.outputs.npm_tag != 'latest'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; set repository secret NPM_TOKEN to publish." >&2
            exit 1
          fi

      - name: Configure npm auth
        if: steps.version_check.outputs.publish == 'true' || steps.version_check.outputs.npm_tag != 'latest'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc

      - name: Publish to npm
        if: steps.version_check.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag ${{ steps.version_check.outputs.npm_tag }}

      - name: Ensure prerelease dist-tags
        if: steps.version_check.outputs.npm_tag != 'latest'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: '@sealad886/homebridge-blink-cameras-new-api'
          TARGET_VERSION: ${{ steps.version_check.outputs.target }}
          PRERELEASE_TAG: ${{ steps.version_check.outputs.npm_tag }}
          STABLE_VERSION: ${{ steps.version_check.outputs.stable_version }}
        run: |
          npm dist-tag add "${PACKAGE_NAME}@${TARGET_VERSION}" "${PRERELEASE_TAG}"
          if [ -n "${STABLE_VERSION}" ] && [ "${STABLE_VERSION}" != "${TARGET_VERSION}" ]; then
            npm dist-tag add "${PACKAGE_NAME}@${STABLE_VERSION}" latest
          fi
          npm dist-tag ls "${PACKAGE_NAME}"

      - name: Create GitHub release
        if: steps.version_check.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_check.outputs.target }}
          name: v${{ steps.version_check.outputs.target }}
          generate_release_notes: true
          prerelease: ${{ steps.version_check.outputs.npm_tag != 'latest' }}

      - name: Skip publish
        if: steps.version_check.outputs.publish != 'true'
        run: echo "Version ${TARGET:-unknown} already on npm (current=${CURRENT:-unknown}). Skipping publish."
        env:
          TARGET: ${{ steps.version_check.outputs.target }}
          CURRENT: ${{ steps.version_check.outputs.current }}
